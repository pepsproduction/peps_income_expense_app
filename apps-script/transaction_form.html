  <div class="auto-time-box">
    <div>
      <span>เวลาบันทึก</span>
      <small>วันที่/เวลาปัจจุบัน Asia/Bangkok อัตโนมัติ</small>
    </div>
    <b>⏱️ อัตโนมัติ</b>
  </div>

  <label>
    จำนวนเงิน (บาท) *
    <input name="amount" inputmode="decimal" type="number" step="0.01" min="0.01" placeholder="0.00" required>
  </label>

  <label>
    หัวข้อ / หมวดหมู่ *
    <div class="inline-field">
      <select name="category" required>
        <option value="">-- เลือกหมวดหมู่ --</option>
      </select>
      <button class="ghost-btn add-inline-category" type="button">+ เพิ่ม</button>
    </div>
  </label>

  <label>
    ชื่อรายการ *
    <input name="title" placeholder="เช่น รับงานถ่ายภาพ / เติมน้ำมัน" required>
  </label>

  <label>
    หมายเหตุ
    <textarea name="note" rows="3" placeholder="รายละเอียดเพิ่ม เช่น ลูกค้าโอนมัดจำ / ใช้ไปงานไหน"></textarea>
  </label>

  <div class="two-col">
    <label>
      ช่องทางเงิน
      <select name="payment_method">
        <option>โอน</option>
        <option>พร้อมเพย์</option>
        <option>เงินสด</option>
        <option>บัตร</option>
        <option>อื่น ๆ</option>
      </select>
    </label>
    <label>
      สถานะ
      <select name="status">
        <option value="paid">รับ/จ่ายแล้ว</option>
        <option value="pending">รอดำเนินการ</option>
        <option value="cancelled">ยกเลิก</option>
      </select>
    </label>
  </div>

  <div class="two-col">
    <label>
      งาน / โปรเจกต์
      <input name="project" placeholder="เช่น ฟุตบอลเลิงนกทา">
    </label>
    <label>
      ลูกค้า
      <input name="client" placeholder="ชื่อลูกค้า / หน่วยงาน">
    </label>
  </div>

  <label>
    แนบสลิป
    <input name="slip" type="file" accept="image/*,.pdf">
    <small>ไม่เกิน 5 MB · เก็บใน Google Drive (folder: Peps_Expense_Slips)</small>
  </label>
