<style>
/* ==========================================================
   PEPS Income / Expense App — Apps Script Styles
   Theme: Dark (#080808) + Orange (#ff7a00)
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #080808;
  --panel: #151515;
  --panel-2: #1f1f1f;
  --text: #f7f7f7;
  --muted: #a7a7a7;
  --line: rgba(255, 255, 255, 0.09);
  --orange: #ff7a00;
  --orange-2: #ff9d2e;
  --green: #2dd36f;
  --red: #ff4b55;
  --shadow: 0 20px 60px rgba(0,0,0,.4);
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 24px;
  --radius-xl: 26px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}
body { padding-bottom: 86px; }
button, input, select, textarea { font: inherit; color: inherit; }
h1, h2, h3, p { margin: 0; }
h1 { font-size: 28px; letter-spacing: -0.03em; font-weight: 900; }
h2 { font-size: 26px; letter-spacing: -0.025em; font-weight: 800; }
h3 { font-size: 18px; font-weight: 700; }
a { color: var(--orange-2); }

.app-shell { max-width: 760px; margin: 0 auto; padding: 18px 14px 100px; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
.eyebrow { color: var(--orange-2); font-size: 11px; letter-spacing: .18em; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
.subtext, .muted, small { color: var(--muted); font-size: 12px; }

.icon-btn, .ghost-btn, .primary-btn { border: 0; border-radius: var(--radius-sm); cursor: pointer; transition: transform .15s ease, opacity .15s ease; }
.icon-btn:hover, .ghost-btn:hover { opacity: .85; }
.icon-btn:active, .ghost-btn:active, .primary-btn:active { transform: scale(.96); }
.icon-btn { width: 46px; height: 46px; color: var(--text); background: var(--panel); border: 1px solid var(--line); font-size: 20px; display: grid; place-items: center; }
.ghost-btn { background: rgba(255,255,255,.06); color: var(--text); padding: 10px 14px; border: 1px solid var(--line); font-weight: 700; }
.primary-btn { width: 100%; padding: 16px; color: #101010; background: linear-gradient(135deg, var(--orange), var(--orange-2)); font-weight: 900; font-size: 16px; border-radius: var(--radius-md); box-shadow: 0 4px 20px rgba(255,122,0,.35); }
.income-btn { background: linear-gradient(135deg, var(--green), #8dffbd); box-shadow: 0 4px 20px rgba(45,211,111,.3); }
.expense-btn { background: linear-gradient(135deg, var(--red), #ff9aa0); box-shadow: 0 4px 20px rgba(255,75,85,.3); }
.primary-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }

.page { display: none; }
.page.active { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.hero-card { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; background: radial-gradient(circle at top right, rgba(255,122,0,.3), transparent 36%), linear-gradient(135deg, #1d1d1d, #111); border: 1px solid rgba(255,122,0,.25); border-radius: var(--radius-xl); padding: 22px; box-shadow: var(--shadow); }
.hero-card h2 { font-size: 44px; margin-top: 4px; }
.live-clock { color: var(--orange-2); margin-top: 6px; font-weight: 700; font-size: 13px; }
.status-pill { background: rgba(45,211,111,.13); color: var(--green); border: 1px solid rgba(45,211,111,.28); border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.status-pill.syncing { background: rgba(255,122,0,.13); color: var(--orange-2); border-color: rgba(255,122,0,.28); }
.status-pill.error { background: rgba(255,75,85,.13); color: var(--red); border-color: rgba(255,75,85,.28); }

.metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 14px 0; }
.metric { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 16px; }
.metric span { display: block; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
.metric strong { font-size: 22px; font-weight: 800; }
.metric.income strong { color: var(--green); }
.metric.expense strong { color: var(--red); }

.panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px; margin: 14px 0; }
.warning-panel { display: flex; justify-content: space-between; align-items: center; background: rgba(255,122,0,.1); border-color: rgba(255,122,0,.22); }
.section-head, .section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.section-title { margin: 8px 0 14px; }
.big-emoji { font-size: 36px; }

.summary-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px; scrollbar-width: none; }
.summary-strip::-webkit-scrollbar { display: none; }
.summary-strip span { flex: 0 0 auto; background: var(--panel); border: 1px solid var(--line); padding: 10px 14px; border-radius: 999px; font-size: 13px; color: var(--muted); }
.summary-strip b { color: var(--text); }

.form-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px; display: grid; gap: 16px; }
label { display: grid; gap: 8px; color: var(--muted); font-weight: 700; font-size: 13px; }
input, select, textarea { width: 100%; color: var(--text); background: #0d0d0d; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 14px 15px; outline: none; transition: border-color .15s, box-shadow .15s; }
input:focus, select:focus, textarea:focus { border-color: rgba(255,122,0,.6); box-shadow: 0 0 0 3px rgba(255,122,0,.1); }
select { appearance: auto; }
textarea { resize: vertical; min-height: 80px; }

.inline-field { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.auto-time-box { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(255,122,0,.08); border: 1px solid rgba(255,122,0,.2); color: var(--muted); border-radius: 18px; padding: 13px 16px; }
.auto-time-box b { color: var(--orange-2); font-weight: 800; }
.auto-time-box small { display: block; font-size: 11px; margin-top: 2px; }

.list { display: grid; gap: 10px; margin-top: 12px; }
.txn-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 16px; padding: 14px; }
.txn-item:hover { background: #252525; }
.txn-item strong { display: block; margin-bottom: 4px; font-size: 15px; }
.txn-meta { color: var(--muted); font-size: 12px; line-height: 1.5; }
.txn-amount { font-weight: 900; white-space: nowrap; font-size: 16px; }
.txn-amount.income { color: var(--green); }
.txn-amount.expense { color: var(--red); }

.bar-chart { display: grid; gap: 16px; margin-top: 14px; }
.bar-row { display: grid; gap: 8px; }
.bar-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; }
.bars { display: grid; gap: 5px; }
.bar { height: 12px; border-radius: 999px; min-width: 4px; }
.bar.income { background: var(--green); }
.bar.expense { background: var(--red); }

.category-list { display: grid; gap: 10px; margin-top: 12px; }
.category-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; background: var(--panel-2); border-radius: 14px; padding: 12px 14px; }

.category-add { display: grid; grid-template-columns: 120px 1fr auto; gap: 10px; margin-top: 12px; align-items: end; }
.category-add label { gap: 6px; }
.small-text { color: var(--muted); line-height: 1.6; font-size: 14px; }

.bottom-nav { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); width: min(760px, calc(100% - 24px)); display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: rgba(12,12,12,.92); border: 1px solid var(--line); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 26px; padding: 8px; box-shadow: var(--shadow); z-index: 100; }
.nav-btn { border: 0; background: transparent; color: var(--muted); border-radius: 18px; padding: 9px 4px; display: grid; gap: 3px; place-items: center; cursor: pointer; font-size: 20px; transition: background .15s, color .15s; }
.nav-btn span { font-size: 11px; font-weight: 800; }
.nav-btn.active { background: rgba(255,122,0,.16); color: var(--orange-2); }
.nav-btn:hover:not(.active) { background: rgba(255,255,255,.05); }

.toast { position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(20px); background: #fff; color: #111; padding: 12px 18px; border-radius: 999px; opacity: 0; pointer-events: none; transition: .22s ease; font-weight: 800; max-width: calc(100% - 32px); box-shadow: var(--shadow); z-index: 200; font-size: 14px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); color: #003d1a; }
.toast.error { background: var(--red); color: #fff; }

.empty { color: var(--muted); text-align: center; padding: 28px 20px; font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }

@media (max-width: 520px) {
  .app-shell { padding-inline: 12px; }
  .hero-card { padding: 18px; }
  .hero-card h2 { font-size: 36px; }
  .two-col, .category-add { grid-template-columns: 1fr; }
  .metric strong { font-size: 19px; }
  h1 { font-size: 24px; }
  h2 { font-size: 22px; }
  .primary-btn { padding: 15px; }
}
</style>
