<script>
(() => {
  'use strict';

  const state = {
    categories: { income: [], expense: [] },
    dashboard: null,
    recent: [],
    loading: false,
  };

  const MAX_SLIP_SIZE = 5 * 1024 * 1024;
  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
  const money = (value) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(Number(value || 0));

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    bindNavigation();
    bindForms();
    bindSettings();
    startClock();
    loadData();
    setInterval(loadData, 30000);
  }

  function bindNavigation() {
    $$('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.nav));
    });
    $('#syncBtn').addEventListener('click', loadData);
  }

  function bindForms() {
    ['incomeForm', 'expenseForm'].forEach(id => {
      const form = $('#' + id);
      form.addEventListener('submit', handleSubmit);
      $('.add-inline-category', form).addEventListener('click', () => promptAddCategory(form.dataset.type));
      const fileInput = $('input[name="slip"]', form);
      fileInput.addEventListener('change', () => {
        if (fileInput.files[0] && fileInput.files[0].size > MAX_SLIP_SIZE) {
          toast('ไฟล์ใหญ่เกิน 5 MB');
          fileInput.value = '';
        }
      });
    });
  }

  function bindSettings() {
    $('#addCategoryBtn').addEventListener('click', async () => {
      const type = $('#newCategoryType').value;
      const category = $('#newCategoryName').value.trim();
      if (!category) return toast('กรอกชื่อหมวดหมู่ก่อน');
      setLoading(true, 'กำลังเพิ่มหมวดหมู่...');
      try {
        const res = await gas('addCategory', { type, category });
        state.categories = res.categories;
        renderCategories();
        $('#newCategoryName').value = '';
        toast('เพิ่มหมวดหมู่แล้ว');
      } catch (err) {
        toast(err.message || String(err));
      } finally {
        setLoading(false);
      }
    });
  }

  function navigate(page) {
    $$('.page').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    $$('.nav-btn').forEach(el => el.classList.toggle('active', el.dataset.nav === page));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function loadData() {
    if (state.loading) return;
    setLoading(true, 'กำลัง Sync...');
    try {
      const data = await gas('getBootstrapData');
      state.categories = data.categories || { income: [], expense: [] };
      state.dashboard = data.dashboard || null;
      state.recent = data.recent || [];
      renderAll();
      setStatus('Sync แล้ว');
    } catch (err) {
      console.error(err);
      setStatus('Sync ไม่สำเร็จ');
      toast(err.message || 'โหลดข้อมูลไม่สำเร็จ');
    } finally {
      setLoading(false);
    }
  }

  async function handleSubmit(event) {
    event.preventDefault();
    const form = event.currentTarget;
    const type = form.dataset.type;
    const formData = new FormData(form);

    const payload = {
      type,
      amount: formData.get('amount'),
      category: formData.get('category'),
      title: formData.get('title'),
      note: formData.get('note'),
      payment_method: formData.get('payment_method'),
      project: formData.get('project'),
      client: formData.get('client'),
      status: formData.get('status'),
    };

    const file = formData.get('slip');
    if (file && file.name) {
      if (file.size > MAX_SLIP_SIZE) return toast('ไฟล์ใหญ่เกิน 5 MB');
      payload.slip = await fileToPayload(file);
    }

    setLoading(true, type === 'income' ? 'กำลังบันทึกรายรับ...' : 'กำลังบันทึกรายจ่าย...');
    try {
      const res = await gas('addTransaction', payload);
      state.dashboard = res.dashboard;
      state.recent = res.recent;
      state.categories = res.categories;
      form.reset();
      renderAll();
      toast(res.message || 'บันทึกแล้ว');
      navigate('dashboard');
    } catch (err) {
      console.error(err);
      toast(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  async function promptAddCategory(type) {
    const category = prompt(type === 'income' ? 'เพิ่มหัวข้อรายรับใหม่' : 'เพิ่มหัวข้อรายจ่ายใหม่');
    if (!category || !category.trim()) return;
    setLoading(true, 'กำลังเพิ่มหมวดหมู่...');
    try {
      const res = await gas('addCategory', { type, category: category.trim() });
      state.categories = res.categories;
      renderCategories();
      toast('เพิ่มหมวดหมู่แล้ว');
    } catch (err) {
      toast(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  function renderAll() {
    renderCategories();
    renderDashboard();
    renderRecent();
    renderReports();
  }

  function renderCategories() {
    ['income', 'expense'].forEach(type => {
      const form = $(`#${type}Form`);
      const select = $('select[name="category"]', form);
      const current = select.value;
      select.innerHTML = '';
      (state.categories[type] || []).forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
      if (current) select.value = current;
    });
  }

  function renderDashboard() {
    const d = state.dashboard;
    if (!d) return;
    $('#todayIncome').textContent = money(d.today.income);
    $('#todayExpense').textContent = money(d.today.expense);
    $('#monthIncome').textContent = money(d.month.income);
    $('#monthExpense').textContent = money(d.month.expense);
    $('#monthNet').textContent = money(d.month.net);
    $('#missingSlipCount').textContent = d.missingSlipCount || 0;
    $('#incomeTodayMini').textContent = money(d.today.income);
    $('#incomeWeekMini').textContent = money(d.week.income);
    $('#incomeMonthMini').textContent = money(d.month.income);
    $('#expenseTodayMini').textContent = money(d.today.expense);
    $('#expenseWeekMini').textContent = money(d.week.expense);
    $('#expenseMonthMini').textContent = money(d.month.expense);
  }

  function renderRecent() {
    const list = $('#recentList');
    const data = state.recent || [];
    if (!data.length) {
      list.innerHTML = '<div class="empty">ยังไม่มีรายการ</div>';
      return;
    }
    list.innerHTML = data.map(txn => {
      const sign = txn.type === 'income' ? '+' : '-';
      const cls = txn.type === 'income' ? 'income' : 'expense';
      const slip = txn.slip_url ? ` · <a href="${escapeAttr(txn.slip_url)}" target="_blank">ดูสลิป</a>` : '';
      return `
        <article class="txn-item">
          <div>
            <strong>${escapeHtml(txn.title || '-')}</strong>
            <div class="txn-meta">${escapeHtml(txn.category || '-')} · ${escapeHtml(txn.date || '')} ${escapeHtml(txn.time || '')}${slip}</div>
            ${txn.note ? `<div class="txn-meta">${escapeHtml(txn.note)}</div>` : ''}
          </div>
          <div class="txn-amount ${cls}">${sign}${money(txn.amount)}</div>
        </article>
      `;
    }).join('');
  }

  function renderReports() {
    const d = state.dashboard;
    if (!d) return;
    renderMonthlyBars(d.monthlySeries || []);
    renderCategoryList('#expenseCats', d.expenseByCategory || []);
    renderCategoryList('#incomeCats', d.incomeByCategory || []);
  }

  function renderMonthlyBars(series) {
    const el = $('#monthlyBars');
    if (!series.length) {
      el.innerHTML = '<div class="empty">ยังไม่มีข้อมูลสำหรับกราฟ</div>';
      return;
    }
    const max = Math.max(...series.flatMap(item => [item.income, item.expense, 1]));
    el.innerHTML = series.map(item => `
      <div class="bar-row">
        <div class="bar-label"><span>${escapeHtml(item.month)}</span><b>${money(item.net)}</b></div>
        <div class="bars">
          <div class="bar income" style="width:${Math.max(2, item.income / max * 100)}%"></div>
          <div class="bar expense" style="width:${Math.max(2, item.expense / max * 100)}%"></div>
        </div>
      </div>
    `).join('');
  }

  function renderCategoryList(selector, rows) {
    const el = $(selector);
    if (!rows.length) {
      el.innerHTML = '<div class="empty">ยังไม่มีข้อมูล</div>';
      return;
    }
    el.innerHTML = rows.map(row => `
      <div class="category-row">
        <span>${escapeHtml(row.category)}</span>
        <strong>${money(row.amount)}</strong>
      </div>
    `).join('');
  }

  function fileToPayload(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve({ name: file.name, mimeType: file.type || 'application/octet-stream', base64: String(reader.result).split(',')[1] });
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function gas(functionName, payload) {
    if (window.google && google.script && google.script.run) {
      return new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[functionName](payload);
      });
    }
    return mockGas(functionName, payload);
  }

  function mockGas(functionName, payload) {
    const key = 'peps-finance-mock';
    const data = JSON.parse(localStorage.getItem(key) || '{"categories":{"income":["งานถ่ายภาพ","ไลฟ์สดกีฬา","ขายรูปออนไลน์"],"expense":["น้ำมัน","ค่าอาหาร","อุปกรณ์กล้อง"]},"txns":[]}');
    if (functionName === 'addCategory') {
      data.categories[payload.type] = [...new Set([...(data.categories[payload.type] || []), payload.category])];
      localStorage.setItem(key, JSON.stringify(data));
      return Promise.resolve({ ok: true, categories: data.categories });
    }
    if (functionName === 'addTransaction') {
      const now = new Date();
      data.txns.unshift({ ...payload, id: Date.now().toString(), amount: Number(payload.amount), created_at: now.toISOString(), date: now.toISOString().slice(0,10), time: now.toTimeString().slice(0,8), slip_url: '' });
      localStorage.setItem(key, JSON.stringify(data));
      return Promise.resolve({ ok: true, message: 'บันทึกใน Mock แล้ว', dashboard: buildMockDashboard(data.txns), recent: data.txns, categories: data.categories });
    }
    return Promise.resolve({ ok: true, categories: data.categories, dashboard: buildMockDashboard(data.txns), recent: data.txns, timezone: 'Local mock' });
  }

  function buildMockDashboard(txns) {
    const today = new Date().toISOString().slice(0,10);
    const sum = (arr) => arr.reduce((acc, t) => {
      if (t.type === 'income') acc.income += Number(t.amount || 0);
      if (t.type === 'expense') acc.expense += Number(t.amount || 0);
      acc.net = acc.income - acc.expense;
      return acc;
    }, { income: 0, expense: 0, net: 0 });
    const todayTxns = txns.filter(t => t.date === today);
    const byCat = (type) => Object.values(txns.filter(t => t.type === type).reduce((map, t) => {
      map[t.category] = map[t.category] || { category: t.category, amount: 0 };
      map[t.category].amount += Number(t.amount || 0);
      return map;
    }, {}));
    return { today: sum(todayTxns), week: sum(txns), month: sum(txns), all: sum(txns), missingSlipCount: txns.filter(t => !t.slip_url).length, expenseByCategory: byCat('expense'), incomeByCategory: byCat('income'), monthlySeries: [{ month: today.slice(0,7), ...sum(txns) }] };
  }

  function setLoading(value, message) {
    state.loading = value;
    if (value && message) setStatus(message);
    $('#syncBtn').disabled = value;
  }

  function setStatus(text) {
    $('#syncStatus').textContent = text;
  }

  function toast(message) {
    const el = $('#toast');
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  function startClock() {
    const tick = () => {
      $('#liveClock').textContent = new Intl.DateTimeFormat('th-TH', { dateStyle: 'medium', timeStyle: 'medium' }).format(new Date());
    };
    tick();
    setInterval(tick, 1000);
  }

  function escapeHtml(str) {
    return String(str || '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\'': '&#39;', '"': '&quot;' }[ch]));
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/`/g, '&#96;');
  }
})();
</script>
